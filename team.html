<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>섬기는 이 | 히스토리워십</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Navbar 고정 + 메뉴 가로 */
    .navbar {
      background: rgba(0,0,0,0.7);
      padding: 30px 0;
    }

    .navbar-brand {
      font-size: 24px;
      color: white !important;
      text-decoration: none;
    }

    .navbar-nav {
      flex-direction: row !important;
    }

    .navbar-nav .nav-link {
      margin: 0 50px;
      color: white !important;
      font-size: 18px;
      padding: 0;
    }

    .navbar-nav .nav-link:hover,
    .navbar-nav .nav-link.active {
      color: #ccc !important;
    }

    /* Sub Hero */
    .sub-hero {
      margin-top: 120px; /* 고정 헤더 공간 확보 */
      height: 40vh;
      background-image: url('history1.jpg'); 
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .sub-hero h2 {
      font-size: 40px;
      margin: 0;
    }

    .sub-hero p {
      font-size: 18px;
      margin-top: 10px;
    }

    /* 팀 섹션 */
    .team-section {
      padding: 80px 20px;
      max-width: 1200px;
      margin: auto;
    }

    .team-category {
      margin-bottom: 70px;
    }

    .team-category h3 {
      margin-bottom: 30px;
      font-size: 28px;
      border-bottom: 2px solid #2a2a72;
      display: inline-block;
      padding-bottom: 5px;
    }

    .team-row {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .member {
      text-align: center;
      width: 180px;
    }

    .member .photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
    }

    .member h4 {
      margin: 5px 0;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* 반응형 */
    @media (max-width: 1024px) {
      .navbar-nav .nav-link { margin: 0 20px; font-size: 16px; }
      .navbar-brand { font-size: 20px; }
      .sub-hero { height: 35vh; }
      .member { width: 160px; }
      .member .photo { width: 160px; height: 160px; }
    }

    @media (max-width: 480px) {
      .navbar-nav { flex-direction: column !important; align-items: center; }
      .navbar-nav .nav-link { margin: 5px 0; font-size: 14px; }
      .navbar-brand { font-size: 18px; }
      .sub-hero { height: 30vh; }
      .member { width: 140px; }
      .member .photo { width: 140px; height: 140px; }
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand" href="index.html">히스토리워십 (History Worship)</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="ministry.html">사역 문의</a></li>
        <li class="nav-item"><a class="nav-link active" href="team.html">섬기는 이</a></li>
        <li class="nav-item"><a class="nav-link" href="gallery.html">갤러리</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">문의하기</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Sub Hero -->
<section class="sub-hero">
  <h2>섬기는 이</h2>
  <p>히스토리워십과 함께하는 팀원들을 소개합니다</p>
</section>

<!-- 팀 섹션 -->
<section class="team-section">

  <!-- 전도사 -->
  <div class="team-category">
    <h3>전도사</h3>
    <div class="team-row">
      <div class="member">
        <img class="photo" src="worship.png" alt="전도사 이름">
        <h4>이름</h4>
        <p>인도자 / 말씀 인도</p>
      </div>
    </div>
  </div>

  <!-- 보컬 -->
  <div class="team-category">
    <h3>보컬</h3>
    <div class="team-row">
      <div class="member">
        <img class="photo" src="worship.png" alt="보컬 이름">
        <h4>이름</h4>
        <p>인도자 / 보컬</p>
      </div>
      <div class="member">
        <img class="photo" src="worship.png" alt="보컬 이름">
        <h4>이름</h4>
        <p>보컬</p>
      </div>
    </div>
  </div>

  <!-- 악기 -->
  <div class="team-category">
    <h3>악기</h3>
    <div class="team-row">
      <div class="member">
        <img class="photo" src="worship.png" alt="악기 이름">
        <h4>이름</h4>
        <p>건반</p>
      </div>
      <div class="member">
        <img class="photo" src="worship.png" alt="악기 이름">
        <h4>이름</h4>
        <p>기타</p>
      </div>
      <div class="member">
        <img class="photo" src="worship.png" alt="악기 이름">
        <h4>이름</h4>
        <p>드럼 / 팀 리더</p>
      </div>
    </div>
  </div>

  <!-- 스태프 -->
  <div class="team-category">
    <h3>스태프</h3>
    <div class="team-row">
      <div class="member">
        <img class="photo" src="worship.png" alt="스태프 이름">
        <h4>이름</h4>
        <p>영상 담당</p>
      </div>
      <div class="member">
        <img class="photo" src="worship.png" alt="스태프 이름">
        <h4>이름</h4>
        <p>음향 담당</p>
      </div>
    </div>
  </div>

</section>

<footer>
  <p>© 2026 히스토리워십</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
