<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>문의하기 | 히스토리워십</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* 헤더 고정 + Bootstrap Navbar */
    .navbar {
      background: rgba(0,0,0,0.7);
      padding: 30px 0;
    }

    .navbar-brand {
      font-size: 24px;
      color: white !important;
      text-decoration: none;
    }

    .navbar-nav {
      flex-direction: row !important; /* 메뉴 가로 정렬 */
    }

    .navbar-nav .nav-link {
      margin: 0 50px;
      color: white !important;
      font-size: 18px;
      padding: 0;
    }

    .navbar-nav .nav-link:hover {
      color: #ccc !important;
    }

    /* Sub Hero */
    .sub-hero {
      margin-top: 120px; /* 헤더 공간 확보 */
      height: 40vh;
      background-image: url('worship.png'); /* 원하는 이미지 */
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .sub-hero h2 {
      font-size: 40px;
      margin: 0;
    }

    .sub-hero p {
      font-size: 18px;
      margin-top: 10px;
    }

    /* 콘텐츠 영역 */
    .content {
      padding: 80px 20px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    .content h3 {
      margin-top: 40px;
      margin-bottom: 15px;
    }

    /* 문의 폼 */
    .contact-form {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .contact-form input,
    .contact-form textarea,
    .contact-form select {
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .contact-form textarea {
      min-height: 120px;
      resize: vertical;
    }

    .contact-form button {
      padding: 12px;
      background-color: #2a2a72;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .contact-form button:hover {
      background-color: #1d1d50;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* 반응형 */
    @media (max-width: 1024px) {
      .navbar-nav .nav-link { margin: 0 20px; font-size: 16px; }
      .navbar-brand { font-size: 20px; }
      .sub-hero { height: 35vh; }
    }

    @media (max-width: 480px) {
      .navbar-nav { flex-direction: column !important; align-items: center; }
      .navbar-nav .nav-link { margin: 5px 0; font-size: 14px; }
      .navbar-brand { font-size: 18px; }
      .sub-hero { height: 30vh; }
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand" href="index.html">히스토리워십 (History Worship)</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="ministry.html">사역 문의</a></li>
        <li class="nav-item"><a class="nav-link" href="team.html">섬기는 이</a></li>
        <li class="nav-item"><a class="nav-link" href="gallery.html">갤러리</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">문의하기</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Sub Hero -->
<section class="sub-hero contact-hero">
  <h2>문의하기</h2>
  <p>궁금한 점이 있으시면 언제든지 연락해주세요</p>
</section>

<!-- 콘텐츠 -->
<section class="content">
  <h3>연락처 안내</h3>
  <p>이메일: historyworship@naver.com</p>
  <p>Instagram: @history_worship</p>

  <h3>문의 보내기</h3>
  <form class="contact-form">
    <input type="text" placeholder="이름" required>
    <input type="email" placeholder="이메일" required>
    <select required>
      <option value="">문의 유형 선택</option>
      <option>일반 문의</option>
      <option>협업 제안</option>
      <option>찬양곡 문의</option>
      <option>기타</option>
    </select>
    <textarea placeholder="문의 내용을 작성해주세요" required></textarea>
    <button type="submit">보내기</button>
  </form>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 히스토리워십</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
