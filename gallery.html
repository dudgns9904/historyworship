<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>갤러리 | 히스토리워십</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* 헤더 고정 + Bootstrap Navbar */
    .navbar {
      background: rgba(0,0,0,0.7);
      padding: 30px 0;
    }

    .navbar-brand {
      font-size: 24px;
      color: white !important;
      text-decoration: none;
    }

    .navbar-nav {
      flex-direction: row !important; /* 메뉴 가로 정렬 */
    }

    .navbar-nav .nav-link {
      margin: 0 50px;
      color: white !important;
      font-size: 18px;
      padding: 0;
    }

    .navbar-nav .nav-link:hover {
      color: #ccc !important;
    }

    /* Sub Hero */
    .sub-hero {
      margin-top: 120px; /* 헤더 공간 확보 */
      height: 40vh;
      background-image: url('worship.png'); /* 원하는 이미지 */
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .sub-hero h2 {
      font-size: 40px;
      margin: 0;
    }

    .sub-hero p {
      font-size: 18px;
      margin-top: 10px;
    }

    /* 갤러리 그리드 */
    .gallery-section {
      padding: 80px 20px;
      max-width: 1200px;
      margin: auto;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .gallery-item img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .gallery-item img:hover {
      transform: scale(1.05);
    }

    /* Footer */
    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    /* 반응형 */
    @media (max-width: 1024px) {
      .navbar-nav .nav-link { margin: 0 20px; font-size: 16px; }
      .navbar-brand { font-size: 20px; }
      .gallery-item img { height: 200px; }
    }

    @media (max-width: 480px) {
      .navbar-nav { flex-direction: column !important; align-items: center; }
      .navbar-nav .nav-link { margin: 5px 0; font-size: 14px; }
      .navbar-brand { font-size: 18px; }
      .gallery-item img { height: 180px; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container d-flex justify-content-between">
    <a class="navbar-brand" href="index.html">히스토리워십 (History Worship)</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="ministry.html">사역 문의</a></li>
        <li class="nav-item"><a class="nav-link" href="team.html">섬기는 이</a></li>
        <li class="nav-item"><a class="nav-link active" href="gallery.html">갤러리</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">문의하기</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero 섹션 -->
<section class="sub-hero gallery-hero">
  <h2>갤러리</h2>
  <p>히스토리워십의 사역 현장</p>
</section>

<!-- 갤러리 그리드 -->
<section class="gallery-section">
  <div class="gallery-grid">

    <div class="gallery-item">
      <img src="worship.png" alt="청년 예배 현장" data-bs-toggle="modal" data-bs-target="#galleryModal" data-bs-slide-to="0">
    </div>

    <div class="gallery-item">
      <img src="worship.png" alt="찬양 집회" data-bs-toggle="modal" data-bs-target="#galleryModal" data-bs-slide-to="1">
    </div>

    <div class="gallery-item">
      <img src="worship.png" alt="리허설 모습" data-bs-toggle="modal" data-bs-target="#galleryModal" data-bs-slide-to="2">
    </div>

    <div class="gallery-item">
      <img src="worship.png" alt="팀 단체 사진" data-bs-toggle="modal" data-bs-target="#galleryModal" data-bs-slide-to="3">
    </div>

    <div class="gallery-item">
      <img src="worship.png" alt="특별 집회" data-bs-toggle="modal" data-bs-target="#galleryModal" data-bs-slide-to="4">
    </div>

  </div>
</section>

<!-- Modal + Carousel -->
<div class="modal fade" id="galleryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content bg-dark">
      <div class="modal-body p-0">
        <div id="carouselGallery" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="worship.png" class="d-block w-100" alt="청년 예배 현장">
            </div>
            <div class="carousel-item">
              <img src="worship.png" class="d-block w-100" alt="찬양 집회">
            </div>
            <div class="carousel-item">
              <img src="worship.png" class="d-block w-100" alt="리허설 모습">
            </div>
            <div class="carousel-item">
              <img src="worship.png" class="d-block w-100" alt="팀 단체 사진">
            </div>
            <div class="carousel-item">
              <img src="worship.png" class="d-block w-100" alt="특별 집회">
            </div>
          </div>

          <button class="carousel-control-prev" type="button" data-bs-target="#carouselGallery" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carouselGallery" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
      </div>
      <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal"></button>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <p>© 2026 히스토리워십</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // 클릭 시 해당 슬라이드로 이동
  const galleryItems = document.querySelectorAll('.gallery-item img');
  const carousel = document.getElementById('carouselGallery');
  galleryItems.forEach((img, idx) => {
    img.addEventListener('click', () => {
      const carouselInstance = bootstrap.Carousel.getOrCreateInstance(carousel);
      carouselInstance.to(idx);
    });
  });
</script>

</body>

</html>
